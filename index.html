<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradingBook</title>
    <style>
      /* Pre-splash HTML: visible avant chargement CSS/React pour eviter ecran blanc. */
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #0f1117;
        color: #e8edf3;
        font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
      }

      .boot-splash {
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(74, 144, 226, 0.14), transparent 50%),
          linear-gradient(180deg, #0d1016 0%, #0f1117 55%, #121625 100%);
      }

      .boot-splash__card {
        width: min(360px, calc(100% - 48px));
        border: 1px solid #2a3040;
        border-radius: 14px;
        padding: 30px;
        background: rgba(22, 27, 39, 0.92);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .boot-splash__icon-wrap {
        display: inline-flex;
        width: 132px;
        height: 132px;
        align-items: center;
        justify-content: center;
        padding: 12px;
        margin-bottom: 22px;
        border-radius: 24px;
        border: 1px solid rgba(74, 144, 226, 0.24);
        background: rgba(74, 144, 226, 0.1);
      }

      .boot-splash__icon {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        object-fit: cover;
      }

      .boot-splash__row {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .boot-splash__spinner {
        width: 20px;
        height: 20px;
        border-radius: 9999px;
        border: 2px solid #2a3040;
        border-top-color: #4a90e2;
        animation: boot-spin 0.85s linear infinite;
      }

      @keyframes boot-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .boot-splash__error {
        margin-top: 14px;
        color: #ffb4b4;
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <section class="boot-splash" aria-label="Demarrage TradingBook">
        <div class="boot-splash__card">
          <div class="boot-splash__icon-wrap" aria-hidden="true">
            <img class="boot-splash__icon" src="/tradingbook-icon.png" alt="" />
          </div>
          <div class="boot-splash__row">
            <span class="boot-splash__spinner" aria-hidden="true"></span>
          </div>
        </div>
      </section>
    </div>
    <script>
      // Evite un splash infini si le bundle ne monte jamais React.
      window.__TRADINGBOOK_BOOT_STAGE__ = "html-ready";

      window.addEventListener(
        "error",
        function (event) {
          var root = document.getElementById("root");
          if (!root || root.getAttribute("data-react-mounted") === "true") {
            return;
          }

          var message = "Erreur de chargement JavaScript.";
          if (event && event.message) {
            message = String(event.message);
          }

          root.innerHTML =
            '<section class="boot-splash" aria-label="Erreur demarrage TradingBook">' +
            '<div class="boot-splash__card">' +
            '<div class="boot-splash__error">Echec chargement script.<br/>' +
            message +
            "</div></div></section>";
        },
        true,
      );

      window.setTimeout(function () {
        var root = document.getElementById("root");
        if (!root || root.getAttribute("data-react-mounted") === "true") {
          return;
        }

        root.innerHTML =
          '<section class="boot-splash" aria-label="Erreur demarrage TradingBook">' +
          '<div class="boot-splash__card">' +
          '<div class="boot-splash__row"><span class="boot-splash__spinner" aria-hidden="true"></span></div>' +
          '<div class="boot-splash__error">Demarrage bloque. Fermez TradingBook puis relancez.<br/>Si le probleme persiste, consultez les logs locaux.</div>' +
          "</div></section>";
      }, 12000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
